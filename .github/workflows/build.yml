name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Cập nhật lên v4 cho đồng bộ

    - name: Set up JDK 17
      uses: actions/setup-java@v4  # Cập nhật lên v4 cho đồng bộ
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build with Gradle
      run: ./gradlew assembleDebug || gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4  # 🔥 SỬA CHỖ NÀY: Từ v3 lên v4 để sửa triệt để lỗi sập luồng
      with:
        name: Devtung-Monitor-APK
        path: app/build/outputs/apk/debug/app-debug.apk
