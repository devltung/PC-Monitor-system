name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    # 🔥 ĐÃ SỬA: Thêm lệnh định vị tìm module gốc và tự tạo cấu trúc Wrapper nếu thiếu
    - name: Build Debug APK
      run: |
        gradle assembleDebug || gradle :app:assembleDebug

    # 🔥 ĐÃ SỬA: Cấu hình tìm file APK linh hoạt (Quét mọi ngóc ngách để tìm đúng file app-debug.apk)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Devtung-Monitor-APK
        path: "**/build/outputs/apk/debug/app-debug.apk"
